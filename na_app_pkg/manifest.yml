manifest_version: 2

# =============================================================================
# LocID Native App — manifest.yml
# Provider: LocID
# =============================================================================

version:
  name:    v1_0
  label:   "1.0"
  comment: "LocID enrichment — append TX_CLOC and STABLE_CLOC to IP+timestamp data"

artifacts:
  # Setup script: runs at install time and at each version upgrade
  setup_script: setup.sql
  # Consumer-visible readme shown in the Marketplace listing
  readme: README.md
  # Primary Streamlit entry point: auto-launched when consumer opens the app
  default_streamlit: APP_SCHEMA.LOCID_APP

# The app makes outbound HTTPS calls to central.locid.com for license validation
# and usage statistics. It requires the CREATE EXTERNAL ACCESS INTEGRATION privilege
# so that setup.sql can create LOCID_CENTRAL_EAI in the consumer account at install time.
# The consumer is prompted to approve this privilege during installation.
privileges:
  - CREATE EXTERNAL ACCESS INTEGRATION:
      description: >
        Allows the app to create a network rule and external access integration
        to reach central.locid.com (HTTPS 443) for license validation and
        usage statistics. No customer data is sent.
        Requires ACCOUNTADMIN or a role with the MANAGE APPLICATION SPECIFICATIONS privilege.

references:
  # INPUT_TABLE — consumer input table (read by every Encrypt job)
  - INPUT_TABLE:
      label: "Input Table"
      description: >
        The table containing the rows to be enriched (ip_address + timestamp columns required).
        The app reads this table but never writes to it.
        Use a role that owns this table or has SELECT WITH GRANT OPTION on it.
        This table can be in any database in your account — it does not need to be
        in the app database.
      privileges:
        - SELECT
      object_type: TABLE
      multi_valued: false
      register_callback: APP_SCHEMA.register_single_callback

  # APP_WAREHOUSE — warehouse used to execute Encrypt and Decrypt jobs
  - APP_WAREHOUSE:
      label: "Job Warehouse"
      description: >
        Warehouse the app uses to execute Encrypt and Decrypt jobs.
        An X-Small or Small warehouse is sufficient for typical workloads.
        Use a role that owns this warehouse or has USAGE WITH GRANT OPTION on it.
      privileges:
        - USAGE
      object_type: WAREHOUSE
      multi_valued: false
      register_callback: APP_SCHEMA.register_single_callback

configuration:
  log_level:   INFO
  trace_level: ALWAYS


