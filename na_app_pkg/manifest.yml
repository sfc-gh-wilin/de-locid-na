manifest_version: 2

# =============================================================================
# LocID Native App — manifest.yml
# Provider: LocID
# =============================================================================

version:
  name:    v1_0
  label:   "1.0"
  comment: "LocID enrichment — append TX_CLOC and STABLE_CLOC to IP+timestamp data"

artifacts:
  # Setup script: runs at install time and at each version upgrade
  setup_script: setup.sql
  # Consumer-visible readme shown in the Marketplace listing
  readme: README.md
  # Primary Streamlit entry point: auto-launched when consumer opens the app
  default_streamlit: streamlit/app.py

# The app makes outbound HTTPS calls to central.locid.com for license validation
# and usage statistics. It requires the CREATE EXTERNAL ACCESS INTEGRATION privilege
# so that setup.sql can create LOCID_CENTRAL_EAI in the consumer account at install time.
# The consumer is prompted to approve this privilege during installation.
privileges:
  - CREATE EXTERNAL ACCESS INTEGRATION:
      description: "Allows the app to create an EAI to reach central.locid.com (HTTPS 443) for license validation and usage statistics. No customer data is sent."

references:
  # INPUT_TABLE — consumer input table (read by every Encrypt job)
  - INPUT_TABLE:
      label: "Input Table"
      description: >
        Consumer input table containing the rows to be enriched.
        Must have columns: row_id (STRING), ip_addr (STRING), event_ts (TIMESTAMP).
        The app reads this table but never writes to it.
      privileges:
        - SELECT
      object_type: TABLE
      multi_valued: false
      register_callback: APP_SCHEMA.register_single_callback

  # OUTPUT_SCHEMA — consumer schema where the app writes enriched output tables
  - OUTPUT_SCHEMA:
      label: "Output Schema"
      description: >
        Consumer schema where the app creates enriched output tables.
        The app creates one output table per job run (e.g. NA_TEST_OUTPUT_<job_id>).
      privileges:
        - CREATE TABLE
        - USAGE
      object_type: SCHEMA
      multi_valued: false
      register_callback: APP_SCHEMA.register_single_callback

  # APP_WAREHOUSE — warehouse used to execute Encrypt and Decrypt jobs
  - APP_WAREHOUSE:
      label: "Job Warehouse"
      description: >
        Warehouse the app uses to execute Encrypt and Decrypt jobs.
        A small warehouse (X-Small or Small) is sufficient for typical workloads.
      privileges:
        - USAGE
      object_type: WAREHOUSE
      multi_valued: false
      register_callback: APP_SCHEMA.register_single_callback

configuration:
  log_level:   INFO
  trace_level: ALWAYS


