# =============================================================================
# snowflake.yml — Snow CLI Native App project definition
#
# Usage (run from na_app_pkg/):
#   snow app deploy --connection <conn>                       # upload files → stage
#   snow app version create v1_0 --force --skip-git-check \
#       --connection <conn>                                   # create/patch version
#   snow app run --version v1_0 --connection <conn>           # install / upgrade app
#
# Pre-requisite: mb-locid-encoding WHL must be placed in src/lib/ before deploying.
#   The WHL is staged to @APP_STAGE/lib/ and referenced via IMPORTS in Python UDFs.
# =============================================================================

definition_version: 2

entities:
  pkg:
    type: application package
    identifier: LOCID_DEV_PKG
    stage: APP_SCHEMA.APP_STAGE
    manifest: manifest.yml
    meta:
      role: LOCID_APP_ADMIN
    artifacts:
      # Root files (setup script + manifest + readme)
      - src: setup.sql
        dest: setup.sql
      - src: manifest.yml
        dest: manifest.yml
      - src: README.md
        dest: README.md

      # mb-locid-encoding WHL: local src/lib/ → stage lib/
      # Python UDFs reference @APP_SCHEMA.APP_STAGE/lib/mb_locid_encoding-*.whl
      # dest: ./ places the lib/ directory at the stage root → lib/mb_locid_encoding-*.whl
      - src: src/lib/
        dest: ./

      # SQL scripts (UDFs + stored procs)
      # dest: src/ places each directory inside src/ → src/udfs/... and src/procs/...
      - src: src/udfs/
        dest: src/
      - src: src/procs/
        dest: src/

      # Streamlit app
      # dest: ./ places the streamlit/ directory at the stage root → streamlit/app.py
      - src: streamlit/
        dest: ./

  app:
    type: application
    identifier: LOCID_DEV_APP
    from:
      target: pkg
    meta:
      role: LOCID_APP_INSTALLER
